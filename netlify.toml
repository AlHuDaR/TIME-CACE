[build]
  publish = "."

[[redirects]]
  from = "/"
  to = "/official-time.html"
  status = 301
  force = true

[[redirects]]
  from = "/official-time"
  to = "/official-time.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    Surrogate-Control = "no-store"
