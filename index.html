<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calibration Center Clock</title>
    <link rel="icon" type="image/png" href="images/cal%20logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="clock-shell" aria-label="Analog and digital calibration center clock">
        <div class="clock-face" id="clockFace">
          <img class="watermark" src="images/cal%20logo.png" alt="" aria-hidden="true" />

          <div class="ticks" id="ticks" aria-hidden="true"></div>
          <div class="numbers" id="numbers" aria-hidden="true"></div>

          <div class="digital-core" aria-live="polite">
            <p id="dateText" class="date-text">--.--.----</p>
            <p id="timeText" class="time-text">--:--</p>
            <p id="zoneText" class="zone-text">---</p>
          </div>

          <div class="hand hour-hand" id="hourHand"></div>
          <div class="hand minute-hand" id="minuteHand"></div>
          <div class="hand second-hand" id="secondHand"></div>

          <div class="center-dot" aria-hidden="true"></div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
